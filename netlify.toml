# === Route Rewrites ===
# Maps /api/<domain>-<action> to /.netlify/functions/<domain>-<action>

# Pricing
[[redirects]]
  from = "/api/pricing/calculate"
  to = "/.netlify/functions/pricing-calculate"
  status = 200

