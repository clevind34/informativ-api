<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informativ API Gateway</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a1628; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1a2744; border-radius: 12px; padding: 48px; max-width: 480px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; margin: 0 0 8px; color: #fff; }
        .badge { display: inline-block; background: #065f46; color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 24px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Informativ API Gateway</h1>
        <span class="badge">OPERATIONAL</span>
        <p>Unified serverless API serving all Informativ platform tools.<br>16 endpoints across 6 domains.</p>
    </div>
</body>
</html>
